<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: Hot to Cold Linear Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="50%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <!-- Droplet fill: Soft white/cyan glassmorphic look -->
    <linearGradient id="droplet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dff0fd" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Maskable background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Hexagon outline (matches app aesthetic) -->
  <polygon points="256,90 400,173 400,339 256,422 112,339 112,173" 
           fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="16" stroke-linejoin="round"/>
           
  <!-- Stylized water droplet with glow -->
  <path d="M256,130 C190,230 170,270 170,310 C170,358 208,396 256,396 C304,396 342,358 342,310 C342,270 322,230 256,130 Z" 
        fill="url(#droplet)" filter="url(#glow)"/>

  <!-- Small inner highlights -->
  <circle cx="280" cy="270" r="16" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
</svg>
